<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تصميم الشقة التفاعلي - 265 متر مربع</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8f9fa;
            --wall-color: #34495e;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            color: var(--primary-color);
            font-weight: 800;
        }

        .header p {
            margin: 5px 0 0 0;
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        /* حاوية الرسم لضمان عدم التمرير */
        .svg-container {
            width: 100%;
            max-width: 1000px; /* أقصى عرض للرسم */
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* تنسيقات الغرف في SVG */
        .room {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .room rect {
            stroke: var(--wall-color);
            stroke-width: 4;
            transition: all 0.3s ease;
        }

        .room text {
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            fill: var(--primary-color);
            pointer-events: none; /* لمنع تداخل الماوس مع النص */
        }

        .room .area-text {
            font-size: 14px;
            fill: #7f8c8d;
        }

        .room:hover rect {
            fill: var(--accent-color) !important;
            stroke-width: 6;
        }

        .room:hover text {
            fill: white;
        }

        .room:hover .area-text {
            fill: #ecf0f1;
        }

        /* بطاقة عرض التفاصيل */
        .info-panel {
            margin-top: 20px;
            background: white;
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            text-align: center;
            min-width: 300px;
            border-bottom: 4px solid var(--accent-color);
            transition: all 0.3s ease;
        }

        .info-panel h2 {
            margin: 0 0 10px 0;
            color: var(--primary-color);
        }

        .info-panel p {
            margin: 0;
            font-size: 1.2rem;
            color: #7f8c8d;
        }

        .info-panel span.highlight {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>تصميم الشقة السكنية (التوزيع الأمثل)</h1>
        <p>المساحة الإجمالية التقريبية: 265 متر مربع</p>
    </div>

    <div class="svg-container">
        <!-- سيتم رسم الـ SVG هنا بواسطة الجافاسكربت -->
        <svg id="floorplan" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet"></svg>
    </div>

    <div class="info-panel" id="infoPanel">
        <h2>مرر الماوس على الخريطة</h2>
        <p>لعرض تفاصيل الغرف والمساحات</p>
    </div>

    <script>
        // التصميم المقترح (الأمثل لاستغلال المساحات)
        const apartmentData = [
            { id: "entrance", name: "باب الشقة", area: "-", x: 150, y: 10, w: 100, h: 40, color: "#ecf0f1" },
            { id: "living", name: "الاستقبال والمعيشة", area: 100, x: 50, y: 50, w: 300, h: 500, color: "#e3f2fd" },
            { id: "corridor", name: "ممر التوزيع", area: 30, x: 350, y: 250, w: 600, h: 80, color: "#f5f6fa" },
            
            // الجزء العلوي من الممر
            { id: "guest_bath", name: "حمام ضيوف", area: 5, x: 350, y: 150, w: 80, h: 100, color: "#f8efba" },
            { id: "kitchen", name: "المطبخ", area: 20, x: 430, y: 100, w: 170, h: 150, color: "#ffeaa7" },
            { id: "room3", name: "غرفة نوم 3 / مكتب", area: 20, x: 600, y: 100, w: 200, h: 150, color: "#e8f8f5" },
            { id: "main_bath", name: "حمام مشترك", area: 10, x: 800, y: 100, w: 150, h: 150, color: "#f8efba" },
            
            // الجزء السفلي من الممر
            { id: "room1", name: "غرفة نوم 1", area: 20, x: 350, y: 330, w: 180, h: 220, color: "#e8f8f5" },
            { id: "room2", name: "غرفة نوم 2", area: 20, x: 530, y: 330, w: 180, h: 220, color: "#e8f8f5" },
            { id: "master_suite", name: "جناح رئيسي (غرفة+حمام+ملابس)", area: 40, x: 710, y: 330, w: 240, h: 220, color: "#d1c4e9" }
        ];

        const svg = document.getElementById('floorplan');
        const infoPanel = document.getElementById('infoPanel');

        // دالة لرسم الغرف داخل الـ SVG
        function drawFloorPlan() {
            apartmentData.forEach(room => {
                // إنشاء مجموعة (Group) لكل غرفة
                const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
                group.classList.add("room");
                group.setAttribute("data-name", room.name);
                group.setAttribute("data-area", room.area);

                // رسم المستطيل (الغرفة)
                const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                rect.setAttribute("x", room.x);
                rect.setAttribute("y", room.y);
                rect.setAttribute("width", room.w);
                rect.setAttribute("height", room.h);
                rect.setAttribute("fill", room.color);
                
                // إضافة اسم الغرفة
                const textName = document.createElementNS("http://www.w3.org/2000/svg", "text");
                textName.setAttribute("x", room.x + (room.w / 2));
                textName.setAttribute("y", room.y + (room.h / 2) - 5);
                textName.setAttribute("text-anchor", "middle");
                textName.setAttribute("dominant-baseline", "middle");
                textName.setAttribute("font-size", "18");
                textName.textContent = room.name;

                // إضافة مساحة الغرفة
                const textArea = document.createElementNS("http://www.w3.org/2000/svg", "text");
                textArea.setAttribute("x", room.x + (room.w / 2));
                textArea.setAttribute("y", room.y + (room.h / 2) + 20);
                textArea.setAttribute("text-anchor", "middle");
                textArea.setAttribute("dominant-baseline", "middle");
                textArea.classList.add("area-text");
                textArea.textContent = room.area !== "-" ? `${room.area} متر مربع` : "";

                // تجميع العناصر
                group.appendChild(rect);
                group.appendChild(textName);
                if(room.area !== "-") group.appendChild(textArea);
                svg.appendChild(group);

                // إضافة التفاعل (Hover)
                group.addEventListener('mouseenter', () => {
                    infoPanel.innerHTML = `
                        <h2>${room.name}</h2>
                        <p>المساحة: <span class="highlight">${room.area !== "-" ? room.area + ' م²' : 'غير محددة'}</span></p>
                    `;
                });

                group.addEventListener('mouseleave', () => {
                    infoPanel.innerHTML = `
                        <h2>مرر الماوس على الخريطة</h2>
                        <p>لعرض تفاصيل الغرف والمساحات</p>
                    `;
                });
            });

            // رسم خطوط الأبواب (تجميلي)
            drawDoor(170, 50, 60, "horizontal"); // باب الشقة
            drawDoor(350, 270, 40, "vertical"); // مدخل الممر من المعيشة
        }

        // دالة مساعدة لرسم فتحات الأبواب
        function drawDoor(x, y, size, orientation) {
            const door = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            door.setAttribute("x", x);
            door.setAttribute("y", y);
            if(orientation === "horizontal") {
                door.setAttribute("width", size);
                door.setAttribute("height", 8);
            } else {
                door.setAttribute("width", 8);
                door.setAttribute("height", size);
            }
            door.setAttribute("fill", "white");
            svg.appendChild(door);
        }

        // تشغيل دالة الرسم عند تحميل الصفحة
        window.onload = drawFloorPlan;
    </script>
</body>
</html>
